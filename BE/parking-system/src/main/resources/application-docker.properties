# Docker Profile Configuration
spring.datasource.url=jdbc:postgresql://postgres:5432/parking_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

logging.level.root=INFO
logging.level.parking_Building_Management_System=INFO

# Docker environment
app.jwt.secret=parkingbms2026secretkey1234567890

server.port=8080

# Redis configuration for Docker Compose
spring.redis.host=redis
spring.redis.port=6379
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jackson.serialization.fail-on-empty-beans=false
spring.jpa.open-in-view=true