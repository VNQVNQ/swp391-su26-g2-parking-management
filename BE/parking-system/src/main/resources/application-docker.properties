# Docker Profile Configuration
spring.datasource.url=jdbc:postgresql://postgres:5432/parking_db
spring.datasource.username=postgres
spring.datasource.password=123456

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

logging.level.root=INFO
logging.level.parking_Building_Management_System=INFO

# Docker environment
app.jwt.secret=docker_secret_key_change_in_production

server.port=8080

# Redis configuration for Docker Compose
spring.redis.host=redis
spring.redis.port=6379

