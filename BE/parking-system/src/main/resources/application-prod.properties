# Production Profile Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://prod-db:5432/parking_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

logging.level.root=WARN
logging.level.parking_Building_Management_System=INFO

# Production JWT Secret (use environment variables)
app.jwt.secret=${JWT_SECRET:please_set_env_variable}
app.jwt.expiration=86400000

server.port=8080

# Security settings
spring.security.user.password=${ADMIN_PASSWORD:admin123}

# Redis configuration for production
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD}

