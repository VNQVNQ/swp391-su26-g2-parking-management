version: '3.8'

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: parking_postgres
    environment:
      POSTGRES_DB: parking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parking_network

  # ── Redis ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: parking_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parking_network

  # ── Backend (Spring Boot) ───────────────────────────────────────────
  backend:
    build:
      context: ./BE/parking-system
      dockerfile: Dockerfile
    container_name: parking_backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: parkingbms2026secretkey12345678901234567890abcd
      DB_PASSWORD: postgres
      DB_USERNAME: postgres
      DATABASE_URL: jdbc:postgresql://postgres:5432/parking_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - parking_network
    restart: on-failure

  # ── Frontend (React + Nginx) ────────────────────────────────────────
  frontend:
    build:
      context: ./FE/smart-parking-fe
      dockerfile: Dockerfile
    container_name: parking_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - parking_network
    restart: on-failure

volumes:
  postgres_data:

networks:
  parking_network:
    driver: bridge
